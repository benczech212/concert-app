<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concert Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      text-align: center;
    }
    .story-card {
      background: rgba(25, 25, 35, 0.6);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      max-width: 650px;
      width: 100%;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .story-img-container {
      width: 100%;
      height: 350px;
      background-size: cover;
      background-position: center;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .story-text {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e2e8f0;
      text-align: justify;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }
    .loading {
      color: #888;
      font-size: 1.2rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>The Night's Stories</h1>
  <div id="stories-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div class="loading">Loading stories...</div>
  </div>

  <script>
    async function loadStories() {
      try {
        const [storiesRes, imagesRes] = await Promise.all([
            fetch('/api/stories'),
            fetch('/api/images')
        ]);
        
        const stories = await storiesRes.json();
        const imagesData = await imagesRes.json();
        
        // Create an image lookup map
        const imageMap = {};
        if (Array.isArray(imagesData)) {
            imagesData.forEach(img => {
               imageMap[img.trackId] = img.imageBase64;
            });
        }
        
        const container = document.getElementById('stories-container');
        container.innerHTML = '';
        
        if (stories.length === 0) {
          container.innerHTML = '<div class="loading">No stories have been generated yet.</div>';
          return;
        }

        stories.forEach(story => {
          const card = document.createElement('div');
          card.className = 'story-card';
          
          const imgHtml = imageMap[story.trackId] ? `<div class="story-img-container" style="background-image: url('data:image/jpeg;base64,${imageMap[story.trackId]}')"></div>` : '';
          
          card.innerHTML = `
            ${imgHtml}
            <div style="text-align: center; margin-top: -5px; margin-bottom: 5px;">
                <h4 style="margin: 0; color: #fff; font-size: 1.4rem;">${story.newName}</h4>
                <div style="color: #a8b2d1; font-size: 0.9rem; margin-top: 5px;">Track: ${story.originalTitle}</div>
            </div>
            <div class="story-text">${story.story}</div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        document.getElementById('stories-container').innerHTML = '<div class="loading">Error loading stories.</div>';
      }
    }

    loadStories();

    // Listen for SSE events in case stories are ready while watching this page
    const isBypass = new URLSearchParams(window.location.search).get('bypass') === 'true';
    const evtSource = new EventSource(`/api/stream${isBypass ? '?bypass=true' : ''}`);
    evtSource.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.type === 'stories_ready') {
                loadStories();
            }
        } catch (e) {
            // ignore JSON parse errors from keepalives
        }
    };
  </script>
<script src="nav.js"></script>
</body>
</html>
