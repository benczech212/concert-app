# default concert-app config
event:
  artist: "Markus Gottschlich"
  location: "Museum Performance"
  participation: "Anonymous by default"

copy:
  welcomeTitle: "Welcome, "
  welcomeText: "Help us build a screenplay for tonight’s performance. Select the mood and color you hear in the music. Selections are saved instantly."
  footerText: "Thank you for participating — enjoy the performance."

moods:
  - name: "Happy"
    glow: "rgba(255, 230, 150, .25)"
  - name: "Relaxed"
    glow: "rgba(150, 255, 220, .20)"
  - name: "Melancholy"
    glow: "rgba(170, 160, 255, .22)"
  - name: "Excited"
    glow: "rgba(255, 160, 160, .22)"
  - name: "Calm"
    glow: "rgba(160, 210, 255, .20)"
  - name: "Tense"
    glow: "rgba(255, 180, 120, .22)"
  - name: "Awe"
    glow: "rgba(180, 255, 240, .22)"
  - name: "Reflective"
    glow: "rgba(210, 190, 255, .22)"
