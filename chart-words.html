<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Word Cloud</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            padding: 20px;
            background: var(--bg);
            color: var(--text);
        }

        canvas {
            width: 100% !important;
            height: 80vh !important;
        }
    </style>
</head>

<body>
    <div style="text-align:center; margin-bottom: 20px;">
        <h1>Live Word Cloud</h1>
        <a href="index.html" class="secondary" style="text-decoration: none; padding: 5px 10px;">&larr; Back to App</a>
    </div>
    <canvas id="wordCloud"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script>
        async function loadData() {
            const res = await fetch('/api/events');
            const events = await res.json();
            const wordCounts = {};

            events.forEach(e => {
                if (e.category === 'note' && e.value) {
                    const words = e.value.toLowerCase().match(/\w+/g);
                    if (words) words.forEach(w => { if (w.length > 3) wordCounts[w] = (wordCounts[w] || 0) + 1; });
                }
            });

            const list = Object.entries(wordCounts).map(([w, c]) => [w, c * 10 + 20]);
            if (list.length) {
                WordCloud(document.getElementById('wordCloud'), { list, weightFactor: 3, color: 'random-light', backgroundColor: 'transparent' });
            }
        }
        loadData(); setInterval(loadData, 5000);
    </script>
</body>

</html>
