<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Join the Show</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .qr-placeholder {
            width: 400px;
            height: 400px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
        }
        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .counter {
            font-size: 3rem;
            margin-top: 3rem;
            font-weight: bold;
            color: #aaa;
        }
        .counter span {
            color: #fff;
            font-size: 4.5rem;
            margin-left: 10px;
        }
        
    </style>
</head>
<body>
    <h1>Scan to Join the Experience</h1>
    <div class="qr-placeholder">
        <img id="qrImage" src="" alt="QR Code" />
    </div>
    <div class="counter">Connected Devices:<span id="userCount">0</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Generate QR code pointing to the specific host
        const currentUrl = "https://concert-app-r52d.onrender.com";
        const qrContainer = document.querySelector('.qr-placeholder');
        qrContainer.innerHTML = ''; // clear img
        new QRCode(qrContainer, {
            text: currentUrl,
            width: 400,
            height: 400,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Poll for active connected devices
        async function updateCount() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                document.getElementById('userCount').innerText = data.connectedUsers || 0;
            } catch (e) {
                console.error(e);
            }
        }
        updateCount();
        setInterval(updateCount, 2000); // 2 second refresh
    </script>
</body>
</html>
