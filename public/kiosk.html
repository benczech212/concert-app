<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Concert App Kiosk</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            padding: 0;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 5px;
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        
        h2 {
            margin: 10px 0 0 0;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .canvas-wrapper {
            position: relative;
            flex-grow: 1;
            padding: 20px 40px 40px 40px; /* add bottom padding to stop axis clipping */
            width: 100%;
            box-sizing: border-box;
            min-height: 0; /* ensures flexbox lets it shrink */
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        .canvas-wrapper.fade-out {
            opacity: 0;
        }

        canvas {
            display: block;
        }
        
        /* Word cloud wrapper */
        #wordCloud {
            width: 100%;
            height: 100%;
            display: none;
        }
        
        #kioskChart {
            display: block;
        }

    </style>
</head>

<body>
    <div class="header">
        <h1>Concert Live Data</h1>
        <h2 id="viewTitle">Loading...</h2>
    </div>
    <div class="canvas-wrapper">
        <canvas id="kioskChart"></canvas>
        <canvas id="wordCloud"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@3.0.0/dist/chartjs-chart-treemap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

    <script>
        const CYCLE_INTERVAL_MS = 20000; // 20 seconds per view
        const DATA_REFRESH_MS = 5000;    // 5 seconds data fetch

        let rawEventsData = [];
        let chartInstance = null;
        let wordCloudInst = null;
        let lastRenderedCloudIndex = -1; // Throttle cloud redraws
        
        let currentViewIndex = 0; // Replaced by wall clock
        let currentTimelineSeries = null;

        const urlParams = new URLSearchParams(window.location.search);
        const kioskNum = parseInt(urlParams.get('kiosk')) || 1;
        const KIOSK_OFFSET = kioskNum === 2 ? 4 : 0;

        let views = [];
        if (kioskNum === 2) {
            views = [
                { id: 'color_heatmap', title: 'Color Heatmap Timeline', category: 'color', type: 'bubble' },
                { id: 'words', title: 'Word Cloud', category: 'note', type: 'cloud' },
                { id: 'color_time', title: 'Color Timeline', category: 'color', type: 'timeline' },
                { id: 'total_time', title: 'Total Engagement Over Time', category: 'overall', type: 'timeline_total' },
                { id: 'mood_bar', title: 'Mood Distribution', category: 'mood', type: 'bar' },
                { id: 'reaction_time', title: 'Reaction Timeline', category: 'reaction', type: 'timeline' },
                { id: 'color_bar', title: 'Color Distribution', category: 'color', type: 'bar' },
                { id: 'mood_time', title: 'Mood Timeline', category: 'mood', type: 'timeline' },
                { id: 'users_time', title: 'Connected Audience Over Time', category: 'users', type: 'timeline_users' },
                { id: 'reaction_pie', title: 'Reaction Distribution', category: 'reaction', type: 'pie' }
            ];
        } else {
            views = [
                { id: 'mood_bar', title: 'Mood Distribution', category: 'mood', type: 'bar' },
                { id: 'color_heatmap', title: 'Color Heatmap Timeline', category: 'color', type: 'bubble' },
                { id: 'total_time', title: 'Total Engagement Over Time', category: 'overall', type: 'timeline_total' },
                { id: 'color_bar', title: 'Color Distribution', category: 'color', type: 'bar' },
                { id: 'reaction_pie', title: 'Reaction Distribution', category: 'reaction', type: 'pie' },
                { id: 'users_time', title: 'Connected Audience Over Time', category: 'users', type: 'timeline_users' },
                { id: 'mood_time', title: 'Mood Timeline', category: 'mood', type: 'timeline' },
                { id: 'reaction_time', title: 'Reaction Timeline', category: 'reaction', type: 'timeline' },
                { id: 'words', title: 'Word Cloud', category: 'note', type: 'cloud' }
            ];
        }

        let displayData = {
            mood: { totals: {}, timeline: {}, engCount: 0 },
            color: { totals: {}, timeline: {}, engCount: 0 },
            reaction: { totals: {}, timeline: {}, engCount: 0 },
            overall: { timeline: {}, noteEngCount: 0 },
            users: { timeline: {}, engCount: 0 },
            words: {},
            trackEvents: [],
            colorHexMap: {}
        };

        function sortViewsByEngagement() {
            views.sort((a, b) => {
                let countA = 0;
                let countB = 0;
                
                if (a.category === 'overall') countA = displayData.overall.noteEngCount + displayData.mood.engCount + displayData.color.engCount + displayData.reaction.engCount;
                else if (a.category === 'note') countA = displayData.overall.noteEngCount;
                else if (displayData[a.category]) countA = displayData[a.category].engCount;

                if (b.category === 'overall') countB = displayData.overall.noteEngCount + displayData.mood.engCount + displayData.color.engCount + displayData.reaction.engCount;
                else if (b.category === 'note') countB = displayData.overall.noteEngCount;
                else if (displayData[b.category]) countB = displayData[b.category].engCount;

                // Secondary sort to keep relative stable order for equal counts
                if (countB === countA) return a.id.localeCompare(b.id);
                return countB - countA;
            });
            
            // Move users_time view to be somewhat randomized or prioritized based on overall engagement
            views.sort((a, b) => {
                if (a.id === 'users_time' && (displayData.overall.noteEngCount + displayData.mood.engCount) % 2 === 0) return -1;
                return 0;
            });
        }

        const palette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5'];

        function createAnnotations() {
            let annotations = {};
            displayData.trackEvents.forEach((evt, i) => {
                const trackName = evt.title || `Track ${String(evt.id || '').replace('trk_', '')}`;
                const labelText = evt.value === 'track_start' ? `${trackName} Start` : `${trackName} End`;
                annotations[`line${i}`] = {
                    type: 'line',
                    xMin: evt.time,
                    xMax: evt.time,
                    borderColor: evt.value === 'track_start' ? 'rgba(50, 255, 100, 0.8)' : 'rgba(255, 100, 50, 0.8)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    label: {
                        content: labelText,
                        display: true,
                        position: 'start',
                        backgroundColor: 'rgba(0,0,0,0.7)',
                        color: evt.value === 'track_start' ? 'rgba(50, 255, 100, 1)' : 'rgba(255, 100, 50, 1)'
                    }
                };
            });
            return annotations;
        }

        async function fetchAndProcessData() {
            try {
                const res = await fetch('/api/events');
                rawEventsData = await res.json();

                // Reset display data
                displayData = {
                    mood: { totals: {}, timeline: {}, engCount: 0 },
                    color: { totals: {}, timeline: {}, engCount: 0 },
                    reaction: { totals: {}, timeline: {}, engCount: 0 },
                    overall: { timeline: {}, noteEngCount: 0 },
                    users: { timeline: {}, engCount: 0 },
                    words: {},
                    trackEvents: [],
                    colorHexMap: {},
                    hexColorNameMap: {}
                };

                rawEventsData.forEach(e => {
                    if (e.timestamp) {
                        const d = new Date(e.timestamp);
                        const t = d.getTime();

                        if (e.category === 'system' && (e.value === 'track_start')) { // only show start for timelines
                            const dStart = new Date(e.timestamp);
                            dStart.setSeconds(0);
                            dStart.setMilliseconds(0);
                            displayData.trackEvents.push({ time: dStart.getTime(), value: e.value, title: e.trackTitle, id: e.trackId });
                        }
                        
                        if (e.category === 'system' && (e.value === 'connected_users')) {
                            const dUsers = new Date(e.timestamp);
                            dUsers.setSeconds(0);
                            dUsers.setMilliseconds(0);
                            const bucketTime = dUsers.getTime();
                            displayData.users.timeline[bucketTime] = Math.max(displayData.users.timeline[bucketTime] || 0, e.count || 0);
                            displayData.users.engCount += 1; // Used for rotation weighting
                        }

                        if (['mood', 'color', 'reaction'].includes(e.category)) {
                            // Timeline bucket
                            const bd = new Date(e.timestamp);
                            bd.setSeconds(0);
                            bd.setMilliseconds(0);
                            const bucketTime = bd.getTime();

                            let val = e.value;
                            
                            if (e.category === 'color') {
                                const hex = e.colorRgba || val;
                                displayData.colorHexMap[val] = hex;
                                displayData.hexColorNameMap[hex] = val;
                                val = hex; // Group by the exact hex value in the timeline and totals
                            }
                            
                            // Timeline
                            catData.timeline[bucketTime] = catData.timeline[bucketTime] || {};
                            catData.timeline[bucketTime][val] = (catData.timeline[bucketTime][val] || 0) + 1;
                            
                            // Totals
                            catData.totals[val] = (catData.totals[val] || 0) + 1;
                            catData.engCount++;
                            
                            displayData.overall.timeline[bucketTime] = (displayData.overall.timeline[bucketTime] || 0) + 1;
                        }
                        
                        if (e.category === 'note' && e.value) {
                            displayData.overall.noteEngCount++;
                            const bd = new Date(e.timestamp);
                            bd.setSeconds(0);
                            bd.setMilliseconds(0);
                            const bucketTime = bd.getTime();
                            displayData.overall.timeline[bucketTime] = (displayData.overall.timeline[bucketTime] || 0) + 1;
                            
                            const words = e.value.toLowerCase().match(/\w+/g);
                            if (words) {
                                words.forEach(w => {
                                    if (w.length > 3) displayData.words[w] = (displayData.words[w] || 0) + 1;
                                });
                                for (let i = 0; i < words.length - 1; i++) {
                                    if (words[i].length > 2 && words[i+1].length > 2) {
                                        const pair = words[i] + ' ' + words[i+1];
                                        displayData.words[pair] = (displayData.words[pair] || 0) + 1;
                                    }
                                }
                                for (let i = 0; i < words.length - 2; i++) {
                                    if (words[i].length > 2 && words[i+1].length > 2 && words[i+2].length > 2) {
                                        const triplet = words[i] + ' ' + words[i+1] + ' ' + words[i+2];
                                        displayData.words[triplet] = (displayData.words[triplet] || 0) + 1;
                                    }
                                }
                            }
                        }
                    }
                });

                sortViewsByEngagement();
                renderCurrentView();

            } catch (err) { console.error("Error fetching data:", err); }
        }

        function renderCurrentView() {
            const view = views[currentViewIndex];
            let titleText = view.title;
            if (view.type === 'timeline' && currentTimelineSeries) {
                titleText += ` (${currentTimelineSeries})`;
            }
            document.getElementById('viewTitle').innerText = titleText;
            
            const chartCanvas = document.getElementById('kioskChart');
            const wordCanvas = document.getElementById('wordCloud');
            
            if (view.type === 'cloud') {
                chartCanvas.style.display = 'none';
                wordCanvas.style.display = 'block';
                
                const sortedWords = Object.entries(displayData.words).sort((a, b) => b[1] - a[1]).slice(0, 150);
                const maxCount = sortedWords.length ? sortedWords[0][1] : 1;
                const list = sortedWords.map(([w, c]) => [w, 14 + (c / maxCount) * 46]);
                
                // Skip re-rendering if this view is already active (don't live-update)
                if (lastRenderedCloudIndex === currentViewIndex) return; 
                lastRenderedCloudIndex = currentViewIndex;

                if (list.length) {
                    const dpr = window.devicePixelRatio || 1;
                    const rect = wordCanvas.parentElement.getBoundingClientRect();
                    if (rect.width > 0 && rect.height > 0) {
                        wordCanvas.width = rect.width * dpr;
                        wordCanvas.height = rect.height * dpr;
                    }
                    WordCloud(wordCanvas, {
                        list,
                        weightFactor: dpr,
                        color: 'random-light',
                        backgroundColor: 'transparent',
                        shape: 'circle',
                        fontFamily: 'system-ui, sans-serif',
                        gridSize: Math.round(8 * dpr),
                        rotateRatio: 0.1,
                        rotationSteps: 2,
                        shrinkToFit: true,
                        drawOutOfBound: false
                    });
                }
                return;
            } else {
                lastRenderedCloudIndex = -1; // Reset when leaving cloud view
                chartCanvas.style.display = 'block';
                wordCanvas.style.display = 'none';
            }

            const catData = displayData[view.category];
            const annotations = createAnnotations();
            
            function getHueMapValue(colorName) {
                const hex = displayData.colorHexMap[colorName] || colorName;
                if (hex === 'transparent') return 1000;
                if (hex === '#ffffff' || hex === 'white') return 1001;
                if (hex === '#000000' || hex === 'black') return 1003;
                if (!hex.startsWith('#')) return 999;
                let r = parseInt(hex.slice(1,3), 16)/255;
                let g = parseInt(hex.slice(3,5), 16)/255;
                let b = parseInt(hex.slice(5,7), 16)/255;
                let cmax = Math.max(r,g,b), cmin = Math.min(r,g,b), delta = cmax - cmin, h = 0;
                if (delta === 0) h = 0;
                else if (cmax === r) h = ((g - b) / delta) % 6;
                else if (cmax === g) h = (b - r) / delta + 2;
                else h = (r - g) / delta + 4;
                h = Math.round(h * 60);
                if (h < 0) h += 360;
                return h;
            }

            let bgColorBar = 'rgba(150, 200, 255, 0.6)';
            if (view.category === 'color') bgColorBar = 'rgba(255, 150, 200, 0.6)';
            if (view.category === 'reaction') bgColorBar = ['rgba(200, 200, 200, 0.6)', 'rgba(150, 255, 150, 0.6)', 'rgba(255, 200, 50, 0.6)'];

            updateChart(chartCanvas, view.category, catData.totals || {}, catData.timeline, bgColorBar, annotations, view.type);
        }

        function updateChart(canvasEl, categoryLabel, totalsMap, timelineMap, bgColorBar, annotations, viewMode) {
            let labels = Object.keys(totalsMap);

            if (viewMode === 'timeline') {
                const times = Object.keys(timelineMap).sort((a, b) => parseInt(a) - parseInt(b));
                const dataData = times.map(t => parseInt(t));

                let labelsToShow = labels;
                if (currentTimelineSeries && labels.includes(currentTimelineSeries)) {
                    labelsToShow = [currentTimelineSeries];
                }

                const datasets = labelsToShow.map((labelValue, i) => {
                    const pointData = times.map(t => (timelineMap[t] && timelineMap[t][labelValue]) || 0);
                    
                    // For finding original palette index
                    const originalIndex = labels.indexOf(labelValue);
                    let color = palette[originalIndex % palette.length];

                    let borderColor = color;
                    let borderDash = [];
                    let readableLabel = labelValue;
                    
                    if (categoryLabel === 'reaction') {
                        if (labelValue === 'applause') { readableLabel = 'Applause 👏'; color = '#006400'; }
                        else if (labelValue === 'like') { readableLabel = 'Like 👍'; color = '#90ee90'; }
                        else { readableLabel = 'Meh 😐'; color = '#808080'; }
                        borderColor = color;
                    }

                    if (categoryLabel === 'color') {
                        // labelValue IS the exact hex group now
                        const hex = labelValue;
                        readableLabel = displayData.hexColorNameMap[hex] || hex;
                        color = hex;
                        borderColor = hex === 'transparent' ? '#ffffff' : hex;
                        borderDash = hex === 'transparent' ? [5, 5] : [];
                    }

                    return {
                        label: readableLabel,
                        data: pointData,
                        borderColor: borderColor,
                        backgroundColor: color,
                        borderDash: borderDash,
                        tension: 0.1,
                        fill: false
                    };
                });

                if (chartInstance && chartInstance.config.type === 'line') {
                    chartInstance.data.labels = dataData;
                    chartInstance.data.datasets = datasets;
                    chartInstance.options.plugins.annotation.annotations = annotations;
                    chartInstance.update('none');
                } else {
                    if (chartInstance) chartInstance.destroy();
                    const ctx = canvasEl.getContext('2d');
                    Chart.defaults.color = '#fff';
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dataData,
                            datasets: datasets
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            animation: { duration: 500 },
                            scales: { 
                                x: { type: 'time', time: { unit: 'minute' }, grid: { color: 'rgba(255,255,255,0.1)' } }, 
                                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } } 
                            },
                            plugins: { 
                                annotation: { annotations: annotations },
                                legend: { labels: { color: 'white' } }
                            }
                        }
                    });
                }
            } else if (viewMode === 'timeline_total') {
                const times = Object.keys(timelineMap).sort((a, b) => parseInt(a) - parseInt(b));
                const dataData = times.map(t => parseInt(t));
                const pointData = times.map(t => timelineMap[t] || 0);

                const dataset = {
                    label: 'Total Engagement',
                    data: pointData,
                    borderColor: 'rgba(50, 255, 150, 1)',
                    backgroundColor: 'rgba(50, 255, 150, 0.2)',
                    tension: 0.4,
                    fill: true
                };

                if (chartInstance && chartInstance.config.type === 'line' && chartInstance.data.datasets.length === 1 && chartInstance.data.datasets[0].label === 'Total Engagement') {
                    chartInstance.data.labels = dataData;
                    chartInstance.data.datasets = [dataset];
                    chartInstance.options.plugins.annotation.annotations = annotations;
                    chartInstance.update('none');
                } else {
                    if (chartInstance) chartInstance.destroy();
                    const ctx = canvasEl.getContext('2d');
                    Chart.defaults.color = '#fff';
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dataData,
                            datasets: [dataset]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            animation: { duration: 500 },
                            scales: { 
                                x: { type: 'time', time: { unit: 'minute' }, grid: { color: 'rgba(255,255,255,0.1)' } }, 
                                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } } 
                            },
                            plugins: { 
                                annotation: { annotations: annotations },
                                legend: { labels: { color: 'white' } }
                            }
                        }
                    });
                }
            } else if (viewMode === 'timeline_users') {
                const times = Object.keys(timelineMap).sort((a, b) => parseInt(a) - parseInt(b));
                const dataData = times.map(t => parseInt(t));
                const pointData = times.map(t => timelineMap[t] || 0);

                const dataset = {
                    label: 'Connected Audience',
                    data: pointData,
                    borderColor: 'rgba(50, 150, 255, 1)',
                    backgroundColor: 'rgba(50, 150, 255, 0.2)',
                    tension: 0.4,
                    fill: true
                };

                if (chartInstance && chartInstance.config.type === 'line' && chartInstance.data.datasets.length === 1 && chartInstance.data.datasets[0].label === 'Connected Audience') {
                    chartInstance.data.labels = dataData;
                    chartInstance.data.datasets = [dataset];
                    chartInstance.options.plugins.annotation.annotations = annotations;
                    chartInstance.update('none');
                } else {
                    if (chartInstance) chartInstance.destroy();
                    const ctx = canvasEl.getContext('2d');
                    Chart.defaults.color = '#fff';
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dataData,
                            datasets: [dataset]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            animation: { duration: 500 },
                            scales: { 
                                x: { type: 'time', time: { unit: 'minute' }, grid: { color: 'rgba(255,255,255,0.1)' } }, 
                                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } } 
                            },
                            plugins: { 
                                annotation: { annotations: annotations },
                                legend: { labels: { color: 'white' } }
                            }
                        }
                    });
                }
            } else if (viewMode === 'bubble') {
                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }

                const ctx = canvasEl.getContext('2d');
                const width = canvasEl.width;
                const height = canvasEl.height;

                ctx.clearRect(0, 0, width, height);

                // Build track ranges dynamically from rawEventsData
                let trackRanges = [];
                let currentTrack = null;
                rawEventsData.forEach(e => {
                    if (e.category === 'system') {
                        if (e.value === 'track_start') {
                            currentTrack = { id: e.trackId, title: e.trackTitle, start: new Date(e.timestamp).getTime(), end: Date.now() };
                            trackRanges.push(currentTrack);
                        } else if (e.value === 'track_end' && currentTrack && currentTrack.id === e.trackId) {
                            currentTrack.end = new Date(e.timestamp).getTime();
                            currentTrack = null;
                        }
                    }
                });

                if (trackRanges.length === 0) return;

                const rowHeight = height / trackRanges.length;
                
                trackRanges.forEach((track, index) => {
                    const trackEvents = rawEventsData.filter(e => 
                        e.category === 'color' && 
                        e.timestamp && 
                        new Date(e.timestamp).getTime() >= track.start && 
                        new Date(e.timestamp).getTime() <= track.end
                    );

                    const yOffset = index * rowHeight;
                    const ribbonHeight = rowHeight * 0.8; // Leave a little gap between rows
                    const y = yOffset + (rowHeight - ribbonHeight) / 2;

                    // Background bar for the track
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.fillRect(0, y, width, ribbonHeight);

                    // Track Title
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.font = '12px system-ui, sans-serif';
                    ctx.textAlign = 'left';
                    const cleanId = String(track.id).replace('trk_', '');
                    ctx.fillText(`Track ${cleanId} ${track.title ? '- ' + track.title : ''}`, 10, y + 16);

                    if (trackEvents.length > 0) {
                        const timeRange = Math.max(1000, track.end - track.start);
                        
                        const posMap = new Map();
                        trackEvents.forEach(e => {
                            const t = new Date(e.timestamp).getTime();
                            const pos = Math.max(0, Math.min(1, (t - track.start) / timeRange));
                            const hex = e.colorRgba || e.value;
                            posMap.set(pos.toFixed(4), hex);
                        });

                        const sortedPositions = Array.from(posMap.keys()).map(parseFloat).sort((a, b) => a - b);
                        
                        if (sortedPositions.length > 0) {
                            const gradient = ctx.createLinearGradient(0, 0, width, 0);
                            
                            // Ensure 0 and 1 exist so the gradient covers the whole bar gracefully
                            if (sortedPositions[0] > 0) {
                                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                            }
                            
                            sortedPositions.forEach(pos => {
                                gradient.addColorStop(pos, posMap.get(pos.toFixed(4)));
                            });
                            
                            if (sortedPositions[sortedPositions.length - 1] < 1) {
                                gradient.addColorStop(1, posMap.get(sortedPositions[sortedPositions.length - 1].toFixed(4)));
                            }
                            
                            ctx.fillStyle = gradient;
                            ctx.fillRect(0, y, width, ribbonHeight);
                        }
                    }
                    
                    // Time Labels
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.textAlign = 'left';
                    ctx.fillText(new Date(track.start).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 10, y + ribbonHeight - 4);
                    
                    ctx.textAlign = 'right';
                    ctx.fillText(new Date(track.end).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), width - 10, y + ribbonHeight - 4);
                });
            } else { // bar or pie
                let data = Object.values(totalsMap);
                let renderBgColors = bgColorBar;
                
                if (categoryLabel === 'mood') {
                    const sortedIndices = labels.map((l, i) => i).sort((a, b) => data[b] - data[a]);
                    labels = sortedIndices.map(i => labels[i]);
                    data = sortedIndices.map(i => data[i]);
                }
                
                if (categoryLabel === 'color') {
                    function getHueMapValue(colorName) {
                        const hex = displayData.colorHexMap[colorName] || colorName;
                        if (hex === 'transparent') return 1000;
                        if (hex === '#ffffff' || hex === 'white') return 1001;
                        if (hex === '#000000' || hex === 'black') return 1003;
                        if (!hex.startsWith('#')) return 999;
                        let r = parseInt(hex.slice(1,3), 16)/255;
                        let g = parseInt(hex.slice(3,5), 16)/255;
                        let b = parseInt(hex.slice(5,7), 16)/255;
                        let cmax = Math.max(r,g,b), cmin = Math.min(r,g,b), delta = cmax - cmin, h = 0;
                        if (delta === 0) h = 0;
                        else if (cmax === r) h = ((g - b) / delta) % 6;
                        else if (cmax === g) h = (b - r) / delta + 2;
                        else h = (r - g) / delta + 4;
                        h = Math.round(h * 60);
                        if (h < 0) h += 360;
                        return h;
                    }
                    const sortedIndices = labels.map((l, i) => i).sort((a, b) => getHueMapValue(displayData.hexColorNameMap[labels[a]] || labels[a]) - getHueMapValue(displayData.hexColorNameMap[labels[b]] || labels[b]));
                    let sortedLabels = sortedIndices.map(i => labels[i]);
                    data = sortedIndices.map(i => data[i]);
                    
                    renderBgColors = sortedLabels.map(l => l); // The label itself is the accurate hex
                    // Swap back to string names for the axis
                    labels = sortedLabels.map(l => displayData.hexColorNameMap[l] || l);
                } else if (categoryLabel === 'reaction') {
                    labels = labels.map(l => {
                        if (l === 'applause') return 'Applause 👏';
                        if (l === 'like') return 'Like 👍';
                        if (l === 'meh') return 'Meh 😐';
                        return l;
                    });
                    renderBgColors = labels.map(l => {
                        if (l.includes('Applause')) return '#006400';
                        if (l.includes('Like')) return '#90ee90';
                        return '#808080';
                    });
                }

                if (chartInstance && chartInstance.config.type === viewMode) {
                    chartInstance.data.labels = labels;
                    chartInstance.data.datasets[0].data = data;
                    if (categoryLabel === 'color') chartInstance.data.datasets[0].backgroundColor = renderBgColors;
                    chartInstance.update('none');
                } else {
                    if (chartInstance) chartInstance.destroy();
                    const ctx = canvasEl.getContext('2d');
                    Chart.defaults.color = '#fff';
                    chartInstance = new Chart(ctx, {
                        type: viewMode,
                        data: {
                            labels: labels,
                            datasets: [{ label: `${categoryLabel} Totals`, data: data, backgroundColor: renderBgColors }]
                        },
                        options: { 
                            animation: { duration: 500 }, 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            layout: { padding: viewMode === 'pie' ? 100 : 0 },
                            scales: viewMode === 'bar' ? { 
                                x: { grid: { color: 'rgba(255,255,255,0.1)' } },
                                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } } 
                            } : {},
                            plugins: { legend: { labels: { color: 'white' } } } 
                        }
                    });
                }
            }
        }


        let lastCycleIndex = -1;

        function updateCycleFromTime() {
            const cycleIndex = Math.floor(Date.now() / CYCLE_INTERVAL_MS);
            
            if (cycleIndex !== lastCycleIndex) {
                const isFirstRun = (lastCycleIndex === -1);
                lastCycleIndex = cycleIndex;
                const targetIndex = (cycleIndex + KIOSK_OFFSET) % views.length;

                const wrapper = document.querySelector('.canvas-wrapper');
                if (!isFirstRun) wrapper.classList.add('fade-out');

                setTimeout(() => {
                    currentViewIndex = targetIndex;
                    const view = views[currentViewIndex];
                    
                    if (view.type === 'timeline') {
                        const totals = displayData[view.category].totals;
                        const keys = Object.keys(totals);
                        if (keys.length > 0) {
                            currentTimelineSeries = keys[cycleIndex % keys.length]; // Deterministic
                        } else {
                            currentTimelineSeries = null;
                        }
                    } else {
                        currentTimelineSeries = null;
                    }
                    
                    renderCurrentView();
                    
                    if (!isFirstRun) wrapper.classList.remove('fade-out');
                }, isFirstRun ? 0 : 500);
            }
        }

        // Initialize loops
        fetchAndProcessData().then(() => {
            updateCycleFromTime();
            setInterval(updateCycleFromTime, 1000); // Check every second
            setInterval(fetchAndProcessData, DATA_REFRESH_MS);
        });

    </script>
<script src="nav.js"></script>
</body>
