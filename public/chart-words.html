<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Word Cloud</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            padding: 20px;
            background: var(--bg);
            color: var(--text);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            margin: 0;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .filter-container {
            margin-bottom: 20px;
        }

        .filter-container select, .filter-container .radios {
            background: var(--card);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            display: inline-block;
        }

        .filter-container .radios label {
            margin-right: 15px;
            cursor: pointer;
        }

        .canvas-wrapper {
            position: relative;
            flex-grow: 1;
            height: 350px;
            width: 100%;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>
    <div style="text-align:center; margin-bottom: 20px;">
        <h1>Live Word Cloud</h1>
        <div class="filter-container">
            <label for="trackFilter">Filter by Track: </label>
            <select id="trackFilter" onchange="handleTrackFilterChange()">
                <option value="all">All Time</option>
            </select>
            
            <label for="wordGroupFilter" style="margin-left: 20px;">Word Grouping: </label>
            <div class="radios" style="display: inline-block;">
                <label><input type="radio" name="wordGroup" value="1" checked onchange="handleTrackFilterChange()"> Single Words</label>
                <label><input type="radio" name="wordGroup" value="2" onchange="handleTrackFilterChange()"> Two Words</label>
                <label><input type="radio" name="wordGroup" value="3" onchange="handleTrackFilterChange()"> Three Words</label>
            </div>
        </div>
        <a href="index.html" class="secondary" style="text-decoration: none; padding: 5px 10px;">&larr; Back to App</a>
    </div>
    <div>
        
        
        
        <div class="chart-container">
            <div class="chart-header">
                <h3>Words</h3>
                <button class="toggle-btn" onclick="toggleWordView()">Switch to Bar Chart</button>
            </div>
            <div class="canvas-wrapper">
                <canvas id="wordCloud"></canvas>
                <canvas id="wordBarChart" style="display: none;"></canvas>
                <canvas id="wordTreemap" style="display: none;"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@3.0.0/dist/chartjs-chart-treemap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

    <script>
        let moodChartInstance = null;
        let colorChartInstance = null;
        let reactionChartInstance = null;
        let timelineChartInstance = null;

        let chartViews = {
            mood: 'bar',
            color: 'bar',
            reaction: 'pie'
        };
        let wordView = 'cloud';
        let wordCloudChartInstance = null;
        let wordBarChartInstance = null;

        // Track filtering state
        let currentTrackFilter = 'all';
        let rawEventsData = [];
        let trackRanges = {}; // Map of trackId -> {start: time, end: time, title: str}

        function toggleView(category) {
            const btn = document.querySelector(`button[onclick="toggleView('${category}')"]`);
            if (chartViews[category] === 'bar' || chartViews[category] === 'pie') {
                chartViews[category] = 'timeline';
                btn.textContent = `Switch to ${category === 'reaction' ? 'Pie' : 'Bar'}`;
            } else {
                chartViews[category] = category === 'reaction' ? 'pie' : 'bar';
                btn.textContent = 'Switch to Timeline';
            }
            // Destroy existing instance so we can recreate it with a new type
            if (window[`${category}ChartInstance`]) {
                window[`${category}ChartInstance`].destroy();
                window[`${category}ChartInstance`] = null;
            }
            renderData();
        }

        function toggleWordView() {
            const btn = document.querySelector(`button[onclick="toggleWordView()"]`);
            if (wordView === 'cloud') {
                wordView = 'bar';
                btn.textContent = 'Switch to Treemap';
                document.getElementById('wordCloud').style.display = 'none';
                document.getElementById('wordTreemap').style.display = 'none';
                document.getElementById('wordBarChart').style.display = 'block';
            } else if (wordView === 'bar') {
                wordView = 'treemap';
                btn.textContent = 'Switch to Word Cloud';
                document.getElementById('wordCloud').style.display = 'none';
                document.getElementById('wordTreemap').style.display = 'block';
                document.getElementById('wordBarChart').style.display = 'none';
            } else {
                wordView = 'cloud';
                btn.textContent = 'Switch to Bar Chart';
                document.getElementById('wordCloud').style.display = 'block';
                document.getElementById('wordTreemap').style.display = 'none';
                document.getElementById('wordBarChart').style.display = 'none';
            }
            renderData();
        }

        function handleTrackFilterChange() {
            const selectEl = document.getElementById('trackFilter');
            currentTrackFilter = selectEl.value;
            renderData();
        }

        function createAnnotations(trackEvents) {
            let annotations = {};
            trackEvents.forEach((evt, i) => {
                const labelText = evt.value === 'track_start' ? `Start Track ${evt.id || ''}` : `End Track ${evt.id || ''}`;
                annotations[`line${i}`] = {
                    type: 'line',
                    xMin: evt.time,
                    xMax: evt.time,
                    borderColor: evt.value === 'track_start' ? 'rgba(50, 255, 100, 0.8)' : 'rgba(255, 100, 50, 0.8)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    label: {
                        content: labelText,
                        display: true,
                        position: 'start',
                        backgroundColor: 'rgba(0,0,0,0.7)',
                        color: evt.value === 'track_start' ? 'rgba(50, 255, 100, 1)' : 'rgba(255, 100, 50, 1)'
                    }
                };
            });
            return annotations;
        }

        async function loadData() {
            try {
                const res = await fetch('/api/events');
                rawEventsData = await res.json();

                // First pass: extract track ranges
                trackRanges = {};
                rawEventsData.forEach(e => {
                    if (e.category === 'system' && (e.value === 'track_start' || e.value === 'track_end') && e.timestamp) {
                        const t = new Date(e.timestamp).getTime();
                        const idStr = String(e.trackId);
                        if (!trackRanges[idStr]) trackRanges[idStr] = { title: e.trackTitle || idStr };

                        if (e.value === 'track_start') trackRanges[idStr].start = t;
                        if (e.value === 'track_end') trackRanges[idStr].end = t;
                    }
                });

                // Populate track filter dropdown
                const filterSelect = document.getElementById('trackFilter');
                // Keep the "all" option, remove the rest
                while (filterSelect.options.length > 1) { filterSelect.remove(1); }

                Object.keys(trackRanges).forEach(id => {
                    const opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = trackRanges[id].title || `Track ${id}`;
                    if (currentTrackFilter === id) opt.selected = true;
                    filterSelect.appendChild(opt);
                });

                renderData();

            } catch (err) { console.error(err); }
        }

        function renderData() {
            try {
                const moods = {};
                const colors = {};
                const reactions = {};
                const wordCounts = {};
                let wordGroupFilter = 1;
                const radios = document.getElementsByName('wordGroup');
                for (let i = 0; i < radios.length; i++) {
                    if (radios[i].checked) {
                        wordGroupFilter = parseInt(radios[i].value);
                        break;
                    }
                }

                const timelineMood = {};
                const timelineColor = {};
                const timelineReaction = {};
                const trackEvents = [];

                let activeRange = null;
                if (currentTrackFilter !== 'all' && trackRanges[currentTrackFilter]) {
                    activeRange = trackRanges[currentTrackFilter];
                }

                rawEventsData.forEach(e => {
                    if (e.timestamp) {
                        const d = new Date(e.timestamp);
                        const t = d.getTime();

                        // Filter by active track range if necessary
                        if (activeRange) {
                            if (activeRange.start && t < activeRange.start) return;
                            if (activeRange.end && t > activeRange.end) return;
                        }

                        if (e.category === 'system' && e.value === 'track_start') {
                            const dStart = new Date(e.timestamp);
                            dStart.setSeconds(0);
                            dStart.setMilliseconds(0);
                            trackEvents.push({ time: dStart.getTime(), value: e.value, title: e.trackTitle, id: e.trackId });
                        }

                        if (['mood', 'color', 'reaction'].includes(e.category)) {
                            // Bucket into 60-second intervals for timeline
                            d.setSeconds(0);
                            d.setMilliseconds(0);
                            const bucketTime = d.getTime();

                            if (e.category === 'mood') {
                                timelineMood[bucketTime] = timelineMood[bucketTime] || {};
                                timelineMood[bucketTime][e.value] = (timelineMood[bucketTime][e.value] || 0) + 1;
                            }
                            if (e.category === 'color') {
                                timelineColor[bucketTime] = timelineColor[bucketTime] || {};
                                timelineColor[bucketTime][e.value] = (timelineColor[bucketTime][e.value] || 0) + 1;
                            }
                            if (e.category === 'reaction') {
                                timelineReaction[bucketTime] = timelineReaction[bucketTime] || {};
                                timelineReaction[bucketTime][e.value] = (timelineReaction[bucketTime][e.value] || 0) + 1;
                            }
                        }
                    }

                    // For non-timed exact counting
                    let passFilter = true;
                    if (activeRange && e.timestamp) {
                        const t2 = new Date(e.timestamp).getTime();
                        if (activeRange.start && t2 < activeRange.start) passFilter = false;
                        if (activeRange.end && t2 > activeRange.end) passFilter = false;
                    }

                    if (passFilter) {
                        if (e.category === 'mood') moods[e.value] = (moods[e.value] || 0) + 1;
                        if (e.category === 'color') colors[e.value] = (colors[e.value] || 0) + 1;
                        if (e.category === 'reaction') reactions[e.value] = (reactions[e.value] || 0) + 1;
                        if (e.category === 'note' && e.value) {
                            const words = e.value.toLowerCase().match(/\w+/g);
                            if (words) {
                                if (wordGroupFilter === 1) {
                                    words.forEach(w => {
                                        if (w.length > 3) wordCounts[w] = (wordCounts[w] || 0) + 1;
                                    });
                                } else if (wordGroupFilter === 2) {
                                    for (let i = 0; i < words.length - 1; i++) {
                                        if (words[i].length > 2 && words[i+1].length > 2) {
                                            const pair = words[i] + ' ' + words[i+1];
                                            wordCounts[pair] = (wordCounts[pair] || 0) + 1;
                                        }
                                    }
                                } else if (wordGroupFilter === 3) {
                                    for (let i = 0; i < words.length - 2; i++) {
                                        if (words[i].length > 2 && words[i+1].length > 2 && words[i+2].length > 2) {
                                            const triplet = words[i] + ' ' + words[i+1] + ' ' + words[i+2];
                                            wordCounts[triplet] = (wordCounts[triplet] || 0) + 1;
                                        }
                                    }
                                }
                            }
                        }
                    }
                });

                const annotations = createAnnotations(trackEvents);

                updateChart(document.getElementById('moodChart'), 'moodChartInstance', 'Mood', moods, timelineMood, 'rgba(150, 200, 255, 0.6)', 'rgba(150, 200, 255, 1)', annotations, chartViews.mood);
                updateChart(document.getElementById('colorChart'), 'colorChartInstance', 'Color', colors, timelineColor, 'rgba(255, 150, 200, 0.6)', 'rgba(255, 150, 200, 1)', annotations, chartViews.color);
                updateChart(document.getElementById('reactionChart'), 'reactionChartInstance', 'Reaction', reactions, timelineReaction,
                    ['rgba(200, 200, 200, 0.6)', 'rgba(150, 255, 150, 0.6)', 'rgba(255, 200, 50, 0.6)'],
                    'rgba(150, 255, 150, 1)', annotations, chartViews.reaction);

                if (wordView === 'cloud') {
                    const sortedWords = Object.entries(wordCounts).sort((a, b) => b[1] - a[1]).slice(0, 150);
                    const maxCount = sortedWords.length ? sortedWords[0][1] : 1;
                    const list = sortedWords.map(([w, c]) => [w, 14 + (c / maxCount) * 46]);
                    
                    const wcEl = document.getElementById('wordCloud');
                    if (list.length && wcEl) {
                        const dpr = window.devicePixelRatio || 1;
                        const rect = wcEl.parentElement.getBoundingClientRect();
                        if (rect.width > 0 && rect.height > 0) {
                            wcEl.width = rect.width * dpr;
                            wcEl.height = rect.height * dpr;
                        }
                        WordCloud(wcEl, {
                            list,
                            weightFactor: dpr,
                            color: 'random-light',
                            backgroundColor: 'transparent',
                            shape: 'circle',
                            fontFamily: 'system-ui, sans-serif',
                            gridSize: Math.round(8 * dpr),
                            rotateRatio: 0.1,
                            rotationSteps: 2,
                            shrinkToFit: true,
                            drawOutOfBound: false
                        });
                    }
                } else if (wordView === 'treemap') {
                    const sortedWords = Object.entries(wordCounts).sort((a, b) => b[1] - a[1]).slice(0, 50);
                    const treeData = sortedWords.map(w => ({ name: w[0], value: w[1] }));
                    
                    const canvasEl = document.getElementById('wordTreemap');
                    if (wordCloudChartInstance) {
                        wordCloudChartInstance.data.datasets[0].tree = treeData;
                        wordCloudChartInstance.update('none');
                    } else {
                        const ctx = canvasEl.getContext('2d');
                        Chart.defaults.color = '#fff';
                        wordCloudChartInstance = new Chart(ctx, {
                            type: 'treemap',
                            data: {
                                datasets: [{
                                    tree: treeData,
                                    key: 'value',
                                    groups: ['name'],
                                    backgroundColor: (ctx) => {
                                        const value = ctx.raw ? ctx.raw.v : 0;
                                        const alpha = Math.min(Math.max(value / 10, 0.2), 0.8);
                                        return `rgba(150, 200, 255, ${alpha})`;
                                    },
                                    borderColor: 'rgba(255,255,255,0.2)',
                                    borderWidth: 1,
                                    labels: {
                                        display: true,
                                        formatter: (ctx) => ctx.raw.g,
                                        color: '#ffffff',
                                        font: (ctx) => {
                                            const value = ctx.raw ? ctx.raw.v : 1;
                                            const size = Math.max(12, Math.min(value * 3, 36));
                                            return { size: size, weight: 'bold' };
                                        }
                                    }
                                }]
                            },
                            options: {
                                animation: false,
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false },
                                    tooltip: {
                                        callbacks: {
                                            title: (items) => items[0].raw.g,
                                            label: (item) => `Count: ${item.raw.v}`
                                        }
                                    }
                                }
                            }
                        });
                    }
                } else {
                    const sortedWords = Object.entries(wordCounts).sort((a, b) => b[1] - a[1]).slice(0, 20);
                    const labels = sortedWords.map(w => w[0]);
                    const data = sortedWords.map(w => w[1]);
                    
                    const canvasEl = document.getElementById('wordBarChart');
                    if (wordBarChartInstance) {
                        wordBarChartInstance.data.labels = labels;
                        wordBarChartInstance.data.datasets[0].data = data;
                        wordBarChartInstance.update('none');
                    } else {
                        const ctx = canvasEl.getContext('2d');
                        Chart.defaults.color = '#fff';
                        wordBarChartInstance = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: labels,
                                datasets: [{ label: 'Word Frequency', data: data, backgroundColor: 'rgba(150, 200, 255, 0.6)' }]
                            },
                            options: { animation: false, responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                        });
                    }
                }
            } catch (err) { console.error(err); }
        }

        const palette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5'];

        function updateChart(canvasEl, instanceRefName, label, totalsMap, timelineMap, bgColorBar, bgColorLine, annotations, viewMode) {
            if (!canvasEl) return;
            const labels = Object.keys(totalsMap);

            if (viewMode === 'timeline') {
                const times = Object.keys(timelineMap).sort((a, b) => parseInt(a) - parseInt(b));
                const dataData = times.map(t => parseInt(t));

                const datasets = labels.map((labelValue, i) => {
                    const pointData = times.map(t => (timelineMap[t] && timelineMap[t][labelValue]) || 0);
                    let color = palette[i % palette.length];

                    if (label === 'Color') {
                        const colorMap = { "Red": "red", "Blue": "blue", "Green": "green", "Purple": "purple", "Yellow": "#FFD700", "Amber": "#FFBF00", "Cyan": "cyan" };
                        color = colorMap[labelValue] || labelValue.toLowerCase();
                    }

                    return {
                        label: labelValue,
                        data: pointData,
                        borderColor: color,
                        backgroundColor: color,
                        tension: 0.1,
                        fill: false
                    };
                });

                if (window[instanceRefName] && window[instanceRefName].config.type === 'line') {
                    window[instanceRefName].data.labels = dataData;
                    window[instanceRefName].data.datasets = datasets;
                    // Update annotations in case new ones arrived
                    window[instanceRefName].options.plugins.annotation.annotations = annotations;
                    window[instanceRefName].update();
                } else {
                    if (window[instanceRefName]) window[instanceRefName].destroy();
                    const ctx = canvasEl.getContext('2d');
                    window[instanceRefName] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dataData,
                            datasets: datasets
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            animation: false,
                            scales: { x: { type: 'time', time: { unit: 'minute' } }, y: { beginAtZero: true } },
                            plugins: { annotation: { annotations: annotations } }
                        }
                    });
                }
            } else { // bar or pie
                let labels = Object.keys(totalsMap);
                let data = Object.values(totalsMap);

                let renderBgColors = bgColorBar;
                if (label === 'Color') {
                    const colorMap = { "Red": "red", "Blue": "blue", "Green": "green", "Purple": "purple", "Yellow": "#FFD700", "Amber": "#FFBF00", "Cyan": "cyan" };
                    const hueMap = { "Red": 0, "Amber": 45, "Yellow": 60, "Green": 120, "Cyan": 180, "Blue": 240, "Purple": 300 };

                    const sortedIndices = labels.map((l, i) => i).sort((a, b) => (hueMap[labels[a]] || 999) - (hueMap[labels[b]] || 999));
                    labels = sortedIndices.map(i => labels[i]);
                    data = sortedIndices.map(i => data[i]);

                    renderBgColors = labels.map(l => colorMap[l] || l.toLowerCase());
                }

                if (window[instanceRefName] && window[instanceRefName].config.type === viewMode) {
                    window[instanceRefName].data.labels = labels;
                    window[instanceRefName].data.datasets[0].data = data;
                    if (label === 'Color') window[instanceRefName].data.datasets[0].backgroundColor = renderBgColors;
                    window[instanceRefName].update();
                } else {
                    if (window[instanceRefName]) window[instanceRefName].destroy();
                    const ctx = canvasEl.getContext('2d');
                    window[instanceRefName] = new Chart(ctx, {
                        type: viewMode,
                        data: {
                            labels: labels,
                            datasets: [{ label: `${label} Totals`, data: data, backgroundColor: renderBgColors }]
                        },
                        options: { animation: false, responsive: true, maintainAspectRatio: false, scales: viewMode === 'bar' ? { y: { beginAtZero: true } } : {} }
                    });
                }
            }
        }

        loadData();
        setInterval(loadData, 5000); // 5 sec refresh
    </script>

    <div style="text-align: center; margin-top: 40px; padding-top: 20px;">

    </div>

</body>
